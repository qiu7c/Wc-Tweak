name: Build DEB

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          brew install ldid 2>/dev/null || true
          export THEOS=$HOME/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          git clone https://github.com/theos/theos.git $THEOS --quiet && cd $THEOS && git checkout fc8c31ceb5d13e869a4b828e75f0fd9cb65a0903 && cd -

      - name: Build package
        run: |
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          export THEOS=$HOME/theos
          export PATH="$THEOS/bin:$PATH"
          make clean package FINALPACKAGE=1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: tweak.deb
          path: packages/*.deb
          retention-days: 30
